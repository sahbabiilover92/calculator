<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" type="text/css" href="./styles.css">
</head>
<body>
    <div id = "calculator">
        <div id = "display">
            <p>throw sumn in here.</p>
        </div>
        <div id ="buttonContainer">
            <div id = "btnNumContainer">
                <button id = "0" class = "btnNum">0</button>
                <button id = "1" class = "btnNum">1</button>
                <button id = "2" class = "btnNum">2</button>
                <button id = "3" class = "btnNum">3</button>
                <button id = "4" class = "btnNum">4</button>
                <button id = "5" class = "btnNum">5</button>
                <button id = "6" class = "btnNum">6</button>
                <button id = "7" class = "btnNum">7</button>
                <button id = "8" class = "btnNum">8</button>
                <button id = "9" class = "btnNum">9</button>
            </div>
            <div id ="btnOpContainer">
                <button id = "add" class = "btnOperator">+</button>
                <button id = "subtract" class = "btnOperator">-</button>
                <button id = "multiply" class = "btnOperator">&times;</button>
                <button id = "divide" class = "btnOperator">&divide;</button>
            </div>
            <button id = "btnEquals">=</button>
            <button id = "btnClear">clear</button>
        </div>
    </div>
</body>
</html>
